name: Daily alumni scrape

on:
  schedule:
    - cron: "0 13 * * *"   # 9am ET / 1pm UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run alumni finder
        env:
          APOLLO_API_KEY: ${{ secrets.APOLLO_API_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          HUNTER_API_KEY: ${{ secrets.HUNTER_API_KEY }}
        run: python main.py --resume

      - name: Convert results to site data
        run: python scripts/csv_to_json.py

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add columbia_alumni.csv docs/data.json
          git diff --cached --quiet || git commit -m "Daily alumni data update"
          git push
