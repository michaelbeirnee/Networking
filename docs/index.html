<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Columbia Alumni Directory</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #ffffff;
    --fg: #1a1a1a;
    --muted: #6b7280;
    --border: #e5e7eb;
    --row-hover: #f6f7f9;
    --accent: #2563eb;
    --chip-bg: #eef2ff;
    --chip-fg: #3730a3;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1115;
      --fg: #e6e8eb;
      --muted: #9aa2af;
      --border: #262a33;
      --row-hover: #171a21;
      --accent: #60a5fa;
      --chip-bg: #1e2540;
      --chip-fg: #b7c3ff;
    }
  }
  :root[data-theme="dark"] {
    --bg: #0f1115; --fg: #e6e8eb; --muted: #9aa2af; --border: #262a33;
    --row-hover: #171a21; --accent: #60a5fa; --chip-bg: #1e2540; --chip-fg: #b7c3ff;
  }
  :root[data-theme="light"] {
    --bg: #ffffff; --fg: #1a1a1a; --muted: #6b7280; --border: #e5e7eb;
    --row-hover: #f6f7f9; --accent: #2563eb; --chip-bg: #eef2ff; --chip-fg: #3730a3;
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--fg);
  }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 32px 20px 64px; }
  header { margin-bottom: 24px; }
  h1 { font-size: 1.5rem; margin: 0 0 4px; }
  .meta { color: var(--muted); font-size: 0.875rem; }

  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin: 20px 0;
  }
  input[type="search"], select {
    background: var(--bg);
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 0.9rem;
  }
  input[type="search"] { flex: 1; min-width: 200px; }

  table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
  thead th {
    text-align: left;
    color: var(--muted);
    font-weight: 600;
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }
  thead th:hover { color: var(--fg); }
  tbody tr { border-bottom: 1px solid var(--border); }
  tbody tr:hover { background: var(--row-hover); }
  td { padding: 8px 10px; vertical-align: top; }
  td.name { font-weight: 600; white-space: nowrap; }
  td.email a, td.linkedin a { color: var(--accent); text-decoration: none; }
  td.email a:hover, td.linkedin a:hover { text-decoration: underline; }

  .chip {
    display: inline-block;
    background: var(--chip-bg);
    color: var(--chip-fg);
    border-radius: 999px;
    padding: 2px 9px;
    font-size: 0.75rem;
    font-weight: 600;
    white-space: nowrap;
  }

  .empty, .loading {
    color: var(--muted);
    padding: 40px 0;
    text-align: center;
  }

  .table-scroll { overflow-x: auto; }

  @media (max-width: 640px) {
    td, thead th { padding: 8px 6px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Columbia Alumni Directory</h1>
    <div class="meta" id="meta">Loading…</div>
  </header>

  <div class="controls">
    <input type="search" id="search" placeholder="Search name, company, title…">
    <select id="sectorFilter"><option value="">All sectors</option></select>
  </div>

  <div class="table-scroll">
    <table>
      <thead>
        <tr>
          <th data-key="name">Name</th>
          <th data-key="title">Title</th>
          <th data-key="company">Company</th>
          <th data-key="sector">Sector</th>
          <th data-key="email">Email</th>
          <th data-key="linkedin_url">LinkedIn</th>
          <th data-key="graduation_year">Grad Yr</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </div>
  <div class="empty" id="empty" style="display:none">No matches.</div>
</div>

<script>
  let people = [];
  let sortKey = "name";
  let sortDir = 1;

  async function load() {
    const res = await fetch("data.json?_=" + Date.now());
    const data = await res.json();
    people = data.people || [];

    document.getElementById("meta").textContent =
      `${data.count} people · updated ${new Date(data.generated_at).toLocaleString()}`;

    const sectors = [...new Set(people.map(p => p.sector).filter(Boolean))].sort();
    const sel = document.getElementById("sectorFilter");
    for (const s of sectors) {
      const opt = document.createElement("option");
      opt.value = s; opt.textContent = s;
      sel.appendChild(opt);
    }

    render();
  }

  function render() {
    const q = document.getElementById("search").value.trim().toLowerCase();
    const sector = document.getElementById("sectorFilter").value;

    let filtered = people.filter(p => {
      if (sector && p.sector !== sector) return false;
      if (!q) return true;
      const hay = `${p.name} ${p.title} ${p.company}`.toLowerCase();
      return hay.includes(q);
    });

    filtered.sort((a, b) => {
      const av = (a[sortKey] || "").toString().toLowerCase();
      const bv = (b[sortKey] || "").toString().toLowerCase();
      return av < bv ? -1 * sortDir : av > bv ? 1 * sortDir : 0;
    });

    const tbody = document.getElementById("rows");
    tbody.innerHTML = "";
    document.getElementById("empty").style.display = filtered.length ? "none" : "block";

    for (const p of filtered) {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td class="name">${esc(p.name)}</td>
        <td>${esc(p.title)}</td>
        <td>${esc(p.company)}</td>
        <td><span class="chip">${esc(p.sector)}</span></td>
        <td class="email">${p.email ? `<a href="mailto:${esc(p.email)}">${esc(p.email)}</a>` : ""}</td>
        <td class="linkedin">${p.linkedin_url ? `<a href="${esc(p.linkedin_url)}" target="_blank" rel="noopener">Profile</a>` : ""}</td>
        <td>${esc(p.graduation_year)}</td>
      `;
      tbody.appendChild(tr);
    }
  }

  function esc(s) {
    return (s ?? "").toString()
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  document.getElementById("search").addEventListener("input", render);
  document.getElementById("sectorFilter").addEventListener("change", render);
  document.querySelectorAll("thead th").forEach(th => {
    th.addEventListener("click", () => {
      const key = th.dataset.key;
      if (sortKey === key) sortDir *= -1; else { sortKey = key; sortDir = 1; }
      render();
    });
  });

  load();
</script>
</body>
</html>
